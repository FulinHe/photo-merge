<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>证件合成 — 用户端</title>
  <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    :root {
      --p: #6366f1;
      --s: #10b981;
      --err: #ef4444;
      --gray: #94a3b8;
    }
    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f1f5f9;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      margin: 0;
    }
    .card {
      background: #fff;
      padding: 28px;
      border-radius: 20px;
      width: min(640px, 100%);
      box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
    }
    .status-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      margin-bottom: 16px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gray);
    }
    .dot.online { background: var(--s); box-shadow: 0 0 8px var(--s); }
    .dot.sync { background: var(--p); }
    .dot.error { background: var(--err); }

    h3 { text-align: center; color: #1e293b; margin: 0 0 8px; }
    .sub { text-align: center; font-size: 12px; color: #64748b; margin-bottom: 20px; }

    input, select, textarea, button:not(.preset-card) {
      width: 100%;
      padding: 12px 14px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      box-sizing: border-box;
      font-size: 14px;
    }
    input[type="color"] {
      padding: 4px;
      height: 44px;
      cursor: pointer;
    }
    input[type="file"] {
      padding: 8px;
      font-size: 13px;
    }
    textarea.field-text {
      min-height: 72px;
      resize: vertical;
      font-family: inherit;
      line-height: 1.5;
    }
    button {
      background: var(--p);
      color: #fff;
      border: none;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled { background: #cbd5e1; cursor: not-allowed; }

    #login-box, #work-box { margin-top: 4px; }
    #result-wrap { margin-top: 16px; text-align: center; }
    #result-wrap img {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
    }
    #msg { font-size: 12px; color: #94a3b8; text-align: center; margin-top: 10px; }
    label.field { font-size: 12px; color: #64748b; display: block; margin-top: 10px; }
    label.field:first-child { margin-top: 0; }

    .pf-section {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid #e2e8f0;
    }
    .pf-section:first-of-type { border-top: 0; margin-top: 8px; padding-top: 0; }
    .pf-h {
      font-size: 14px;
      font-weight: 700;
      color: #334155;
      margin: 0 0 6px;
    }
    .pf-desc {
      font-size: 12px;
      color: #94a3b8;
      margin: 0 0 10px;
      line-height: 1.45;
    }
    .pf-layer {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .pf-layer-title {
      font-size: 12px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 8px;
    }
    .pf-thumb {
      max-width: 100%;
      max-height: 140px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      display: block;
      margin-bottom: 8px;
      background: #fff;
    }
    .pf-err { color: var(--err); font-size: 13px; margin: 8px 0; }
    details.adv {
      margin-top: 14px;
      font-size: 12px;
      color: #64748b;
    }
    details.adv summary { cursor: pointer; user-select: none; }
    details.adv textarea {
      margin-top: 8px;
      min-height: 120px;
      font-family: Consolas, monospace;
      font-size: 11px;
    }
    details.adv-login {
      margin-top: 12px;
      font-size: 12px;
      color: #64748b;
    }
    details.adv-login summary {
      cursor: pointer;
      user-select: none;
    }
    details.adv-login input {
      margin-top: 0;
    }

    .preset-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(112px, 1fr));
      gap: 10px;
      margin-top: 8px;
    }
    button.preset-card {
      width: auto;
      min-width: 0;
      padding: 8px;
      margin: 0;
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      color: #334155;
      font-weight: 600;
      font-size: 11px;
      line-height: 1.3;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 6px;
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
    }
    button.preset-card:hover {
      border-color: #cbd5e1;
    }
    button.preset-card.selected {
      border-color: var(--p);
      background: #eef2ff;
      box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.25);
    }
    button.preset-card img {
      width: 100%;
      height: 76px;
      object-fit: cover;
      border-radius: 8px;
      margin: 0;
      padding: 0;
      border: none;
    }
    .preset-card-ph {
      width: 100%;
      height: 76px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e2e8f0;
      color: #64748b;
      font-size: 16px;
      font-weight: 700;
      border-radius: 8px;
    }
    .preset-card span {
      word-break: break-word;
    }

    .progress-wrap {
      display: none;
      margin: 14px 0 10px;
    }
    .progress-wrap.visible {
      display: block;
    }
    .progress-bar {
      height: 8px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 35%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--p), #818cf8);
      transition: transform 0.2s;
    }
    .progress-fill.indeterminate {
      animation: progressIndet 1.2s ease-in-out infinite;
    }
    @keyframes progressIndet {
      0% { transform: translateX(-100%); width: 40%; }
      50% { width: 55%; }
      100% { transform: translateX(280%); width: 40%; }
    }
    .progress-text {
      font-size: 12px;
      color: #64748b;
      margin: 8px 0 0;
      line-height: 1.45;
      min-height: 2.9em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div style="text-align:center;">
      <div class="status-tag">
        <div id="status-dot" class="dot"></div>
        <span id="status-text">正在初始化…</span>
      </div>
    </div>

    <h3>证件合成 · 用户端</h3>
    <p class="sub">选择预设后，只需填写引号内的文字，并可选替换头像图（头像.png）。</p>

    <div id="login-box">
      <input type="text" id="u" placeholder="账号" autocomplete="username" />
      <input type="password" id="p" placeholder="密码" autocomplete="current-password" />
      <button type="button" id="login-btn">连接并登录</button>
      <details class="adv-login">
        <summary>高级：自定义中枢 ID</summary>
        <p class="pf-desc" style="margin:8px 0 4px;">一般不用改；仅当你的管理端使用了其它 Peer ID 时再填写。</p>
        <input type="text" id="admin-id" placeholder="留空则使用内置默认" autocomplete="off" />
      </details>
    </div>

    <div id="work-box" style="display:none;">
      <label class="field">选择预设</label>
      <p class="pf-desc" style="margin:0 0 4px;">点击下方卡片（图为管理端同名预览图）</p>
      <div id="preset-grid" class="preset-grid" aria-label="预设列表"></div>

      <div id="preset-form"></div>

      <details class="adv">
        <summary>高级：查看原始 JSON（一般不必打开）</summary>
        <textarea id="preset-json-view" readonly placeholder="选择预设后出现…"></textarea>
      </details>

      <button type="button" id="submit-btn" disabled>提交合成</button>

      <div id="progress-wrap" class="progress-wrap" role="status" aria-live="polite">
        <div class="progress-bar" aria-hidden="true">
          <div id="progress-fill" class="progress-fill indeterminate"></div>
        </div>
        <p id="progress-text" class="progress-text"></p>
      </div>

      <p id="msg"></p>
      <div id="result-wrap"></div>
    </div>
  </div>

  <script>
    const ADMIN_ID_DEFAULT = "IDCARD_SYNTH_ADMIN_2026";
    const PRESET_VERSION = 1;

    const PEER_OPTIONS = {
      host: "0.peerjs.com",
      port: 443,
      path: "/",
      secure: true,
      config: {
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          { urls: "stun:stun1.l.google.com:19302" },
          { urls: "stun:stun2.l.google.com:19302" },
          { urls: "stun:stun.stunprotocol.org:3478" },
          { urls: "stun:global.stun.twilio.com:3478" }
        ],
        iceCandidatePoolSize: 10,
        iceTransportPolicy: "all"
      }
    };

    /**
     * 必须用 binary（BinaryPack）：json 模式用 JSON.stringify，无法传输 ArrayBuffer（会变成 {}），
     * 且单条 >~16KB 会 MessageToBig。binary 与网盘代下一致，可传大块二进制。
     */
    const DATA_CONN_OPTS = { reliable: true, serialization: "binary" };
    const LOGIN_CONNECT_MS = 35000;

    let peer = new Peer(PEER_OPTIONS);
    let conn = null;
    /** 每次点击登录 +1，用于区分旧连接事件，避免用 conn===thisConn 在超时置 null 后误杀 open */
    let loginGen = 0;
    let loginConnectTimer = null;
    let currentPreset = null;
    /** 与中枢 presets Map 的 key 一致，用于合成时与本地完整预设合并 */
    let currentPresetId = null;
    let presetInbox = null;
    let renderPngInbox = null;
    let avatarLayerId = null;
    const textLayerParse = {};

    let renderProgressFallbackTimer = null;
    const renderProgressHints = [
      "仍在处理中，请勿关闭页面…",
      "大图与二维码耗时较长属正常现象",
      "若超过两分钟无结果，可请管理员查看中枢日志"
    ];

    const statusDot = document.getElementById("status-dot");
    const statusText = document.getElementById("status-text");

    function updateStatus(state, msg) {
      statusText.textContent = msg;
      statusDot.className = "dot " + state;
    }

    function formatPeerJsError(err) {
      const t = err && err.type;
      if (t === "peer-unavailable") {
        return "找不到管理端：请在本机先打开 admin-p2p.html（并保持页面不关），中枢 Peer ID 须与用户端一致。";
      }
      if (t === "network" || t === "socket-error") {
        return "无法连接 PeerJS 信令服务：检查网络、代理或防火墙，或稍后重试。";
      }
      if (t === "disconnected" || t === "socket-closed") {
        return "与 P2P 服务断开，请刷新页面后重试。";
      }
      if (t === "invalid-id") {
        return "中枢 ID 无效，请展开「高级」检查或与管理端约定一致。";
      }
      if (t === "webrtc-error" || t === "browser-incompatible") {
        return "浏览器 WebRTC 受限：换 Chrome/Edge 最新版，或关闭禁用 WebRTC 的插件。";
      }
      return (err && (err.message || String(err.type))) || "连接失败";
    }

    function toArrayBufferChunk(v) {
      if (!v) return null;
      if (v instanceof ArrayBuffer) return v;
      if (ArrayBuffer.isView(v)) {
        return v.buffer.slice(v.byteOffset, v.byteOffset + v.byteLength);
      }
      return null;
    }

    function joinUtf8Parts(parts) {
      let total = 0;
      for (const p of parts) {
        if (!p) return null;
        total += p.byteLength;
      }
      const out = new Uint8Array(total);
      let off = 0;
      for (const p of parts) {
        out.set(new Uint8Array(p), off);
        off += p.byteLength;
      }
      return new TextDecoder().decode(out);
    }

    peer.on("open", () => {
      updateStatus("", "已进入 P2P，请登录");
    });

    peer.on("disconnected", () => {
      updateStatus("error", "与信令服务断开，正在尝试重连…");
      try {
        if (typeof peer.reconnect === "function") peer.reconnect();
      } catch (e) {
        console.error(e);
      }
    });

    peer.on("error", (err) => {
      console.error(err);
      updateStatus("error", formatPeerJsError(err));
      setMsg(formatPeerJsError(err));
    });

    function setMsg(t) {
      document.getElementById("msg").textContent = t || "";
    }

    function startRenderProgressUI(initialText) {
      const wrap = document.getElementById("progress-wrap");
      const fill = document.getElementById("progress-fill");
      const txt = document.getElementById("progress-text");
      wrap.classList.add("visible");
      fill.classList.add("indeterminate");
      txt.textContent = initialText || "处理中…";
      let i = 0;
      if (renderProgressFallbackTimer) clearInterval(renderProgressFallbackTimer);
      renderProgressFallbackTimer = setInterval(() => {
        i = (i + 1) % renderProgressHints.length;
        txt.textContent = renderProgressHints[i];
      }, 4500);
    }

    function setRenderProgressText(text) {
      document.getElementById("progress-text").textContent = text || "";
    }

    function stopRenderProgressUI() {
      const wrap = document.getElementById("progress-wrap");
      const fill = document.getElementById("progress-fill");
      const txt = document.getElementById("progress-text");
      wrap.classList.remove("visible");
      fill.classList.remove("indeterminate");
      txt.textContent = "";
      if (renderProgressFallbackTimer) {
        clearInterval(renderProgressFallbackTimer);
        renderProgressFallbackTimer = null;
      }
    }

    function applyPresetPreviewToCard(id, url) {
      if (!id || !url) return;
      const grid = document.getElementById("preset-grid");
      const btn = [...grid.querySelectorAll(".preset-card")].find((b) => b.dataset.id === id);
      if (!btn) return;
      const ph = btn.querySelector(".preset-card-ph");
      const existing = btn.querySelector("img");
      if (existing) {
        existing.src = url;
        return;
      }
      const img = document.createElement("img");
      img.alt = "";
      img.src = url;
      if (ph) ph.replaceWith(img);
      else btn.insertBefore(img, btn.firstChild);
    }

    function renderPresetPicker(items) {
      const grid = document.getElementById("preset-grid");
      grid.innerHTML = "";
      (items || []).forEach((it) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "preset-card";
        btn.dataset.id = it.id;
        if (it.previewDataUrl) {
          const img = document.createElement("img");
          img.src = it.previewDataUrl;
          img.alt = "";
          btn.appendChild(img);
        } else {
          const ph = document.createElement("div");
          ph.className = "preset-card-ph";
          ph.textContent = (it.name || it.id || "?").trim().slice(0, 2) || "?";
          btn.appendChild(ph);
        }
        const cap = document.createElement("span");
        cap.textContent = it.name || it.id;
        btn.appendChild(cap);
        btn.addEventListener("click", () => {
          grid.querySelectorAll(".preset-card").forEach((c) => {
            c.classList.toggle("selected", c === btn);
          });
          clearPresetForm();
          document.getElementById("submit-btn").disabled = true;
          if (!conn || !conn.open) return;
          setMsg("正在拉取预设…");
          conn.send({ type: "PRESET_GET", id: it.id });
        });
        grid.appendChild(btn);
      });
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const fr = new FileReader();
        fr.onload = () => resolve(fr.result);
        fr.onerror = reject;
        fr.readAsDataURL(file);
      });
    }

    function clearPresetForm() {
      presetInbox = null;
      renderPngInbox = null;
      document.getElementById("preset-form").innerHTML = "";
      document.getElementById("preset-json-view").value = "";
      currentPreset = null;
      currentPresetId = null;
      avatarLayerId = null;
      for (const k of Object.keys(textLayerParse)) delete textLayerParse[k];
    }

    /**
     * 解析「冒号后」内容；若整体被英文双引号包裹则只编辑引号内，提交时再包回去。
     * 无冒号时整段作为可编辑内容（兼容旧模板）。
     */
    function parseQuotedAfterColon(text) {
      const raw = String(text ?? "");
      const m = raw.match(/^([\s\S]+?[：:])([\s\S]*)$/);
      if (!m) {
        return { mode: "full", full: raw };
      }
      const prefix = m[1];
      let rest = m[2].trim();
      let quoted = false;
      if (rest.length >= 2 && rest[0] === '"' && rest[rest.length - 1] === '"') {
        quoted = true;
        rest = rest.slice(1, -1);
      }
      const title = prefix.replace(/[：:]\s*$/, "").trim() || "内容";
      return { mode: "edit", prefix, value: rest, quoted, title };
    }

    function rebuildQuotedAfterColon(parsed, newValue) {
      if (parsed.mode === "full") return String(newValue ?? "");
      const v = String(newValue ?? "");
      if (parsed.quoted) return parsed.prefix + '"' + v + '"';
      return parsed.prefix + v;
    }

    function renderPresetForm(preset) {
      const box = document.getElementById("preset-form");
      const jsonView = document.getElementById("preset-json-view");
      box.innerHTML = "";
      jsonView.value = "";
      avatarLayerId = null;
      for (const k of Object.keys(textLayerParse)) delete textLayerParse[k];

      if (!preset || preset.version !== PRESET_VERSION) {
        const p = document.createElement("p");
        p.className = "pf-err";
        p.textContent = "无法识别该预设（需 version " + PRESET_VERSION + "）";
        box.appendChild(p);
        currentPreset = null;
        return;
      }

      currentPreset = JSON.parse(JSON.stringify(preset));
      jsonView.value = JSON.stringify(currentPreset, null, 2);

      const layers = preset.layers || [];
      const texts = layers.filter((x) => x.type === "text");
      const images = layers.filter((x) => x.type === "image");
      const avatarLayer = images.find((x) => !x.isQrLayer) || null;
      const hasQrLayer = images.some((x) => x.isQrLayer);
      const hasCertTextLine = texts.some((layer) => {
        const pr = parseQuotedAfterColon(layer.text);
        return (
          pr.mode === "edit" &&
          (pr.title === "证件号" || pr.title === "证件编号")
        );
      });

      const intro = document.createElement("p");
      intro.className = "pf-desc";
      intro.style.marginTop = "4px";
      let introTxt =
        "模板里请使用「标签：" + '"填写内容"' + "」这种写法；此处只填引号里的字。";
      if (hasQrLayer && hasCertTextLine) {
        introTxt +=
          " 含「证件号」或「证件编号」行时，引号内的编号会在合成时自动写入二维码。";
      } else if (hasQrLayer) {
        introTxt +=
          " 本预设含二维码：请在下方填写编号，或自己在模板中加一行「证件号：" + '"编号"' + "」。";
      }
      introTxt += " 头像请在下方选择本地图片（不再从网络拉取大图）。";
      intro.textContent = introTxt;
      box.appendChild(intro);

      if (texts.length) {
        const sec = document.createElement("div");
        sec.className = "pf-section";
        const h = document.createElement("h4");
        h.className = "pf-h";
        h.textContent = "文字（引号内）";
        sec.appendChild(h);
        texts.forEach((layer) => {
          const parsed = parseQuotedAfterColon(layer.text);
          textLayerParse[layer.id] = parsed;

          const wrap = document.createElement("div");
          wrap.className = "pf-layer";
          const title = document.createElement("div");
          title.className = "pf-layer-title";
          if (parsed.mode === "edit") {
            title.textContent = parsed.title;
          } else {
            title.textContent = "整段文字（本行无冒号分隔，可整段修改）";
          }
          const ta = document.createElement("textarea");
          ta.className = "field-text";
          ta.id = "field-text-" + layer.id;
          ta.value = parsed.mode === "full" ? parsed.full : parsed.value;
          ta.rows = parsed.mode === "full" ? 4 : 2;
          wrap.appendChild(title);
          wrap.appendChild(ta);
          sec.appendChild(wrap);
        });
        box.appendChild(sec);
      }

      if (avatarLayer) {
        avatarLayerId = avatarLayer.id;
        const sec = document.createElement("div");
        sec.className = "pf-section";
        const h = document.createElement("h4");
        h.className = "pf-h";
        h.textContent = "头像（头像.png）";
        sec.appendChild(h);
        const hint = document.createElement("p");
        hint.className = "pf-desc";
        hint.textContent = hasQrLayer
          ? "请选择证件照/头像；选图后下方显示预览。若已填写证件号，二维码会随编号自动更新。"
          : "请选择证件照/头像；选图后下方显示预览。";
        sec.appendChild(hint);
        const im = document.createElement("img");
        im.className = "pf-thumb";
        im.id = "avatar-preview-img";
        im.alt = "头像预览";
        im.style.display = "none";
        sec.appendChild(im);
        const lf = document.createElement("label");
        lf.className = "field";
        lf.textContent = "选择本地图片";
        const fi = document.createElement("input");
        fi.type = "file";
        fi.id = "field-avatar";
        fi.accept = "image/*";
        fi.addEventListener("change", () => {
          const f = fi.files && fi.files[0];
          if (!f) {
            im.style.display = "none";
            im.removeAttribute("src");
            return;
          }
          const r = new FileReader();
          r.onload = () => {
            im.src = r.result;
            im.style.display = "block";
          };
          r.readAsDataURL(f);
        });
        sec.appendChild(lf);
        sec.appendChild(fi);
        box.appendChild(sec);
      } else if (images.length) {
        const sec = document.createElement("div");
        sec.className = "pf-section";
        const p = document.createElement("p");
        p.className = "pf-desc";
        p.textContent = "当前预设只有二维码等图片层，没有可作为头像替换的照片图层。";
        sec.appendChild(p);
        box.appendChild(sec);
      }

      if (hasQrLayer && !hasCertTextLine) {
        const sec = document.createElement("div");
        sec.className = "pf-section";
        const h = document.createElement("h4");
        h.className = "pf-h";
        h.textContent = "二维码编号";
        sec.appendChild(h);
        const d = document.createElement("p");
        d.className = "pf-desc";
        d.textContent =
          "模板中未单独做「证件号」文字行时，在此填写要写入二维码的编号（与导出预设里的 URL 模板 {id} 对应）。";
        sec.appendChild(d);
        const inp = document.createElement("input");
        inp.type = "text";
        inp.id = "field-qr-cert";
        inp.autocomplete = "off";
        inp.placeholder = "输入编号";
        const ui0 = preset.ui || {};
        inp.value = ui0.certId != null ? String(ui0.certId) : "";
        sec.appendChild(inp);
        box.appendChild(sec);
      }

      const canSubmitSomething =
        texts.length > 0 || avatarLayer || hasQrLayer;
      if (!canSubmitSomething) {
        const sec = document.createElement("div");
        sec.className = "pf-section";
        const p = document.createElement("p");
        p.className = "pf-err";
        p.textContent = "该预设没有可填写的文字、头像或二维码编号。";
        sec.appendChild(p);
        box.appendChild(sec);
      }
    }

    async function buildPresetFromForm() {
      if (!currentPreset) throw new Error("未加载预设");
      const p = JSON.parse(JSON.stringify(currentPreset));

      for (const layer of p.layers || []) {
        if (layer.type === "text") {
          const te = document.getElementById("field-text-" + layer.id);
          const parsed = textLayerParse[layer.id];
          if (te && parsed) {
            layer.text = rebuildQuotedAfterColon(parsed, te.value);
          }
        }
        if (layer.type === "image" && avatarLayerId && layer.id === avatarLayerId) {
          const fe = document.getElementById("field-avatar");
          if (fe && fe.files && fe.files[0]) {
            layer.dataUrl = await fileToDataUrl(fe.files[0]);
          }
        }
      }

      p.ui = p.ui || {};
      for (const layer of p.layers || []) {
        if (layer.type !== "text") continue;
        const te = document.getElementById("field-text-" + layer.id);
        const parsed = textLayerParse[layer.id];
        if (!te || !parsed || parsed.mode !== "edit") continue;
        const t = String(parsed.title || "").replace(/\s/g, "");
        if (t === "证件号" || t === "证件编号") {
          p.ui.certId = String(te.value || "").trim();
          break;
        }
      }
      const qrField = document.getElementById("field-qr-cert");
      if (qrField && String(qrField.value || "").trim()) {
        if (!p.ui.certId) p.ui.certId = String(qrField.value || "").trim();
      }

      return p;
    }

    document.getElementById("submit-btn").addEventListener("click", async () => {
      if (!conn || !conn.open) return;
      setMsg("");
      document.getElementById("submit-btn").disabled = true;
      startRenderProgressUI("正在准备数据…");
      try {
        const preset = await buildPresetFromForm();
        setRenderProgressText("正在发送到管理端…");
        if (!conn || !conn.open) {
          throw new Error("连接已断开，请重新登录");
        }
        try {
          conn.send({
            type: "RENDER_REQUEST",
            presetId: currentPresetId,
            preset
          });
        } catch (sendErr) {
          console.error(sendErr);
          throw new Error(
            "发送失败（可能数据过大或链路中断）。请缩小图片后重试，或重新登录。"
          );
        }
        setRenderProgressText("已发送，等待管理端处理…");
      } catch (e) {
        stopRenderProgressUI();
        setMsg(e.message || String(e));
        document.getElementById("submit-btn").disabled = false;
      }
    });

    function onData(data) {
      if (data.type === "AUTH_OK") {
        presetInbox = null;
        renderPngInbox = null;
        updateStatus("sync", "已登录");
        document.getElementById("login-box").style.display = "none";
        document.getElementById("work-box").style.display = "block";
        setMsg("等待管理端推送预设列表…");
        return;
      }
      if (data.type === "AUTH_FAIL") {
        updateStatus("error", "账号或密码错误");
        setMsg("");
        return;
      }
      if (data.type === "PRESET_PREVIEW") {
        applyPresetPreviewToCard(data.id, data.previewDataUrl);
        return;
      }
      if (data.type === "PRESET_LIST") {
        presetInbox = null;
        renderPngInbox = null;
        renderPresetPicker(data.items);
        clearPresetForm();
        document.getElementById("submit-btn").disabled = true;
        setMsg(data.items && data.items.length ? "请点击上方预设卡片" : "管理端暂无预设，请让管理员选择预设目录");
        return;
      }
      if (data.type === "PRESET_DATA_BEGIN") {
        currentPresetId = data.id;
        presetInbox = {
          id: data.id,
          n: data.n,
          parts: new Array(data.n),
          byteMode: !!data.byteMode,
          tid: data.tid
        };
        setMsg("正在接收预设数据（较大，请稍候）…");
        return;
      }
      if (data.type === "PRESET_DATA_CHUNK") {
        if (!presetInbox || presetInbox.id !== data.id) return;
        if (presetInbox.tid !== undefined && data.tid !== presetInbox.tid) return;
        const idx = Number(data.i);
        if (Number.isNaN(idx) || idx < 0 || idx >= presetInbox.n) return;
        const bin = data.bytes != null ? data.bytes : data.data;
        if (presetInbox.byteMode && bin != null) {
          presetInbox.parts[idx] = toArrayBufferChunk(bin);
          if (conn && conn.open) {
            try {
              conn.send({ type: "PRESET_ACK", i: idx, tid: data.tid });
            } catch (e) {}
          }
        } else {
          presetInbox.parts[idx] = data.part;
        }
        return;
      }
      if (data.type === "PRESET_DATA_END") {
        if (!presetInbox || presetInbox.id !== data.id) return;
        if (presetInbox.tid !== undefined && data.tid !== presetInbox.tid) return;
        let raw;
        if (presetInbox.byteMode) {
          raw = joinUtf8Parts(presetInbox.parts);
          if (raw == null) {
            presetInbox = null;
            setMsg("预设数据不完整");
            document.getElementById("submit-btn").disabled = true;
            return;
          }
        } else {
          raw = presetInbox.parts.join("");
        }
        currentPresetId = presetInbox.id;
        presetInbox = null;
        let preset;
        try {
          preset = JSON.parse(raw);
        } catch (e) {
          setMsg("预设数据解析失败");
          document.getElementById("submit-btn").disabled = true;
          return;
        }
        renderPresetForm(preset);
        document.getElementById("submit-btn").disabled = false;
        setMsg("填写或替换后点击提交合成");
        return;
      }
      if (data.type === "PRESET_DATA") {
        presetInbox = null;
        if (data.error) {
          setMsg(data.error);
          document.getElementById("submit-btn").disabled = true;
          return;
        }
        currentPresetId = data.id;
        renderPresetForm(data.preset);
        document.getElementById("submit-btn").disabled = false;
        setMsg("填写或替换后点击提交合成");
        return;
      }
      if (data.type === "RENDER_PROGRESS") {
        document.getElementById("progress-wrap").classList.add("visible");
        document.getElementById("progress-fill").classList.add("indeterminate");
        if (renderProgressFallbackTimer) {
          clearInterval(renderProgressFallbackTimer);
          renderProgressFallbackTimer = null;
        }
        setRenderProgressText(data.text);
        return;
      }
      if (data.type === "RENDER_RESULT_BEGIN") {
        renderPngInbox = {
          n: data.n,
          parts: new Array(data.n),
          byteMode: !!data.byteMode,
          tid: data.tid
        };
        setRenderProgressText("正在接收合成图…");
        return;
      }
      if (data.type === "RENDER_RESULT_CHUNK") {
        if (!renderPngInbox) return;
        if (renderPngInbox.tid !== undefined && data.tid !== renderPngInbox.tid) return;
        const idx = Number(data.i);
        if (Number.isNaN(idx) || idx < 0 || idx >= renderPngInbox.n) return;
        const rbin = data.bytes != null ? data.bytes : data.data;
        if (renderPngInbox.byteMode && rbin != null) {
          renderPngInbox.parts[idx] = toArrayBufferChunk(rbin);
          if (conn && conn.open) {
            try {
              conn.send({ type: "RENDER_ACK", i: idx, tid: data.tid });
            } catch (e) {}
          }
        } else {
          renderPngInbox.parts[idx] = data.part;
        }
        return;
      }
      if (data.type === "RENDER_RESULT_END") {
        if (!renderPngInbox) return;
        if (renderPngInbox.tid !== undefined && data.tid !== renderPngInbox.tid) return;
        let png;
        if (renderPngInbox.byteMode) {
          png = joinUtf8Parts(renderPngInbox.parts);
          if (png == null) {
            renderPngInbox = null;
            stopRenderProgressUI();
            document.getElementById("submit-btn").disabled = false;
            setMsg("合成图数据不完整");
            return;
          }
        } else {
          png = renderPngInbox.parts.join("");
        }
        renderPngInbox = null;
        stopRenderProgressUI();
        document.getElementById("submit-btn").disabled = false;
        const wrap = document.getElementById("result-wrap");
        wrap.innerHTML = "";
        const img = document.createElement("img");
        img.alt = "合成结果";
        img.src = png;
        wrap.appendChild(img);
        setMsg("完成");
        return;
      }
      if (data.type === "RENDER_RESULT") {
        renderPngInbox = null;
        stopRenderProgressUI();
        document.getElementById("submit-btn").disabled = false;
        const wrap = document.getElementById("result-wrap");
        wrap.innerHTML = "";
        if (data.ok && data.png) {
          const img = document.createElement("img");
          img.alt = "合成结果";
          img.src = data.png;
          wrap.appendChild(img);
          setMsg("完成");
        } else {
          setMsg("失败: " + (data.error || "未知错误"));
        }
      }
    }

    document.getElementById("login-btn").addEventListener("click", () => {
      const adminId =
        document.getElementById("admin-id").value.trim() || ADMIN_ID_DEFAULT;
      const u = document.getElementById("u").value.trim();
      const p = document.getElementById("p").value;
      if (!u || !p) {
        setMsg("请填写账号和密码");
        return;
      }

      updateStatus("", "正在连接管理端…");
      setMsg("");

      if (conn) {
        try { conn.close(); } catch (e) {}
        conn = null;
      }
      if (loginConnectTimer) {
        clearTimeout(loginConnectTimer);
        loginConnectTimer = null;
      }

      clearPresetForm();
      document.getElementById("preset-grid").innerHTML = "";
      document.getElementById("submit-btn").disabled = true;

      loginGen += 1;
      const myGen = loginGen;
      conn = peer.connect(adminId, DATA_CONN_OPTS);
      const thisConn = conn;
      const loginBtn = document.getElementById("login-btn");
      loginBtn.disabled = true;

      function releaseLoginUi() {
        loginBtn.disabled = false;
      }

      loginConnectTimer = setTimeout(() => {
        loginConnectTimer = null;
        if (myGen !== loginGen) return;
        if (thisConn && !thisConn.open) {
          try {
            thisConn.close();
          } catch (e) {}
          if (conn === thisConn) conn = null;
          releaseLoginUi();
          updateStatus(
            "error",
            "连接管理端超时：请确认中枢页面已打开、Peer ID 一致，或稍后重试。"
          );
          setMsg(
            "若管理端已开仍超时，多为网络拦截 WebRTC，可换网络或浏览器。"
          );
        }
      }, LOGIN_CONNECT_MS);

      conn.on("error", (err) => {
        console.error(err);
        if (myGen !== loginGen) return;
        if (loginConnectTimer) {
          clearTimeout(loginConnectTimer);
          loginConnectTimer = null;
        }
        releaseLoginUi();
        const tip = formatPeerJsError(err);
        updateStatus("error", tip);
        setMsg(tip);
      });

      conn.on("open", () => {
        if (myGen !== loginGen) return;
        if (!thisConn.open) return;
        if (loginConnectTimer) {
          clearTimeout(loginConnectTimer);
          loginConnectTimer = null;
        }
        updateStatus("online", "已连接，验证中…");
        try {
          thisConn.send({ type: "AUTH", user: u, pass: p });
        } catch (e) {
          releaseLoginUi();
          updateStatus("error", "发送登录信息失败，请重试");
          setMsg(e.message || String(e));
        }
      });

      conn.on("close", () => {
        if (myGen !== loginGen) return;
        if (loginConnectTimer) {
          clearTimeout(loginConnectTimer);
          loginConnectTimer = null;
        }
        releaseLoginUi();
        updateStatus("error", "与管理端断开");
        document.getElementById("work-box").style.display = "none";
        document.getElementById("login-box").style.display = "block";
      });

      conn.on("data", (data) => {
        if (myGen !== loginGen) return;
        if (data.type === "AUTH_OK" || data.type === "AUTH_FAIL") {
          releaseLoginUi();
        }
        onData(data);
      });
    });
  </script>
